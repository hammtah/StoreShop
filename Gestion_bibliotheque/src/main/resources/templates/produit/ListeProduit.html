<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Liste des Produits</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/produit.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>

<body>
    <!-- Inclure la navbar -->
    <div th:insert="~{template1 :: navbar}"></div>

    <div class="container mt-4">
        <div class="card p-2 m-2">
            <div class="card-header">
                <h1 class="mb-0">📚 Liste des Produits</h1>
            </div>

            <div class="card-body">
                <form method="get" th:action="@{/admin/produits}" class="search-form mb-3">
                    <div class="row g-2">
                        <div class="col-md-9">
                            <input type="text" name="search" th:value="${search}" 
                                   class="form-control" placeholder="Rechercher un produit...">
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-primary w-100">🔍 Rechercher</button>
                        </div>
                    </div>
                </form>
                
                <a sec:authorize="hasRole('ADMIN')" 
                   th:href="@{/admin/produits/add(search=${search})}" 
                   class="btn btn-success mb-3">
                    ➕ Ajouter un produit
                </a>
                
                <div class="table-responsive">
                    <table class="table table-striped produit-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Nom</th>
                                <th>Catégorie</th>
                                <th>Description</th>
                                <th>Prix</th>
                                <th>Stock</th>
                                <th sec:authorize="hasRole('ADMIN')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="produit : ${ListeProduit}">
                                <td>
                                    <img th:if="${produit.imageUrl != null and !produit.imageUrl.isEmpty()}" 
                                         th:src="${produit.imageUrl}" 
                                         alt="Image produit" 
                                         class="produit-image">
                                    <span th:unless="${produit.imageUrl != null and !produit.imageUrl.isEmpty()}">Pas d'image</span>
                                </td>
                                <td><strong th:text="${produit.nom}"></strong></td>
                                <td><span class="badge bg-info" th:text="${produit.categorie}"></span></td>
                                <td th:text="${produit.description}"></td>
                                <td><span class="price" th:text="${produit.prix} + ' €'"></span></td>
                                <td>
                                    <span th:class="${produit.stock > 10 ? 'badge bg-success' : 'badge bg-warning'}" 
                                          th:text="${produit.stock}"></span>
                                </td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <a th:href="@{/admin/produits/edit(id=${produit.id}, search=${search})}" 
                                       class="btn btn-sm btn-primary">
                                        ✏️ Modifier
                                    </a>
                                    <a onclick="return confirm('Vous êtes sûr ?')"
                                       th:href="@{/admin/produits/delete(id=${produit.id}, page=${currentPage}, search=${search})}" 
                                       class="btn btn-sm btn-danger">
                                        🗑️ Supprimer
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <nav aria-label="Page navigation" th:if="${pages != null and pages.length > 1}">
                    <ul class="pagination">
                        <li th:each="page,status : ${pages}" class="page-item">
                            <a th:class="${status.index == currentPage ? 'page-link active' : 'page-link'}"
                               th:href="@{/admin/produits(page=${status.index}, search=${search})}" 
                               th:text="${status.index + 1}"></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
