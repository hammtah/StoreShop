<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Utilisateurs</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/user-management.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
    <!-- Navbar -->
    <div th:insert="~{template1 :: navbar}"></div>

    <div class="container mt-4">
        <div class="card p-3">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">👥 Gestion des Utilisateurs</h2>
            </div>

            <div class="card-body">
                <!-- Messages de succès/erreur -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Succès!</strong>
                    <span th:if="${param.success[0] == 'add'}">Utilisateur ajouté avec succès.</span>
                    <span th:if="${param.success[0] == 'edit'}">Utilisateur modifié avec succès.</span>
                    <span th:if="${param.success[0] == 'delete'}">Utilisateur supprimé avec succès.</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Erreur!</strong> <span th:text="${param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="mb-3">
                    <a th:href="@{/admin/users/add}" class="btn btn-success">
                        ➕ Ajouter un utilisateur
                    </a>
                    <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
                        🏠 Retour au Dashboard
                    </a>
                </div>

                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nom d'utilisateur</th>
                            <th>Email</th>
                            <th>Rôles</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.userId}"></td>
                            <td>
                                <strong th:text="${user.username}"></strong>
                            </td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="role : ${user.roles}" 
                                      th:class="${role.roleName == 'ADMIN' ? 'badge bg-danger me-1' : 'badge bg-primary me-1'}"
                                      th:text="${role.roleName}">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/admin/users/edit(userId=${user.userId})}" 
                                   class="btn btn-warning btn-sm">
                                    ✏️ Modifier
                                </a>
                                <a th:href="@{/admin/users/delete(userId=${user.userId})}" 
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')">
                                    🗑️ Supprimer
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
