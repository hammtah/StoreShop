<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Utilisateur</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/user-management.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
    <!-- Navbar -->
    <div th:insert="~{template1 :: navbar}"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h2 class="mb-0">➕ Ajouter un Utilisateur</h2>
            </div>
            <div class="card-body">
                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    <strong>Erreur!</strong> <span th:text="${param.error}"></span>
                </div>

                <form method="post" th:action="@{/admin/users/add}">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="username" class="form-label">Nom d'utilisateur *</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email *</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="password" class="form-label">Mot de passe *</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirmer le mot de passe *</label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rôles</label>
                        <div th:each="role : ${roles}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" 
                                       th:value="${role.roleName}" th:id="${'role_' + role.roleName}">
                                <label class="form-check-label" th:for="${'role_' + role.roleName}">
                                    <span th:class="${role.roleName == 'ADMIN' ? 'badge bg-danger' : 'badge bg-primary'}"
                                          th:text="${role.roleName}"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">💾 Enregistrer</button>
                        <a th:href="@{/admin/users}" class="btn btn-secondary">🚫 Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
